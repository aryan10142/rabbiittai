services:
  - type: web
    name: sales-insight-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: RATE_LIMIT
        value: "10/minute"
